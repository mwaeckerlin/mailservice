services:

  dns:
    build: ./dns
    networks:
      dns-net:
        ipv4_address: 10.100.0.2
    healthcheck:
      test: ["CMD-SHELL", "nc -w1 127.0.0.1 53 </dev/null"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  opendkim:
    build: ../../opendkim
    environment:
      DOMAIN: test.local
    volumes:
      - dkim-keys:/etc/opendkim/keys
    networks: [dkim-net]
    healthcheck:
      test: ["CMD-SHELL", "test -s /run/opendkim/opendkim.pid && kill -0 $(cat /run/opendkim/opendkim.pid)"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  postfix:
    build: ../../postfix
    hostname: postfix.test.local
    environment:
      GREYLIST:       postgrey
      OPENDKIM:       opendkim
      DOMAIN:         test.local
      HOSTNAME:       mail.test.local
      HOSTROOT:       test.local
      DB_HOST:        db
      DB_USER:        postfixadmin
      DB_PASSWORD:    testpass
      DB_NAME:        postfixadmin
      DISABLE_DNSBL:  "yes"
      MYNETWORKS:     "127.0.0.0/8"
    dns: ["10.100.0.2"]
    depends_on:
      db:
        condition: service_healthy
      opendkim:
        condition: service_healthy
      dns:
        condition: service_healthy
    networks: [mail, greylisting, db-net, dkim-net, dns-net]

  dovecot:
    build: ../../dovecot
    environment:
      DB_HOST:              db
      DB_USER:              postfixadmin
      DB_PASSWORD:          testpass
      DB_NAME:              postfixadmin
      DOMAIN:               test.local
      DEFAULT_PASS_SCHEME:  PLAIN
    depends_on:
      db:
        condition: service_healthy
    networks: [mail, db-net]

  postgrey:
    build: ../../postgrey
    # Override CMD: 5 s greylist delay; autowhite in greylist.conf enables auto-whitelist
    command: ["-w", "5"]
    volumes:
      - ./greylist.conf:/etc/milter-greylist/greylist.conf:ro
    networks: [greylisting]
    # Reduce DNS timeout so reverse-PTR failures don't delay every SMTP transaction
    dns_opt:
      - "timeout:1"
      - "attempts:1"
    healthcheck:
      test: ["CMD-SHELL", "nc -w2 127.0.0.1 10025 </dev/null"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE:             postfixadmin
      MYSQL_USER:                 postfixadmin
      MYSQL_PASSWORD:             testpass
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - ./init/db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "postfixadmin", "-ptestpass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [db-net]

  fake-smtp:
    build: ../../../fake-smtp
    volumes:
      - fake-mails:/mails
    networks: [mail]

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postfix:
        condition: service_started
      dovecot:
        condition: service_started
      postgrey:
        condition: service_healthy
    environment:
      POSTFIX_HOST:   postfix
      DOVECOT_HOST:   dovecot
      OPENDKIM_HOST:  opendkim
      SMTP_PORT:      "25"
      IMAP_PORT:      "143"
      POP3_PORT:      "110"
      SIEVE_PORT:     "4190"
      OPENDKIM_PORT:  "10026"
      MAIL_DOMAIN:    test.local
      ALICE_USER:     alice@test.local
      ALICE_PASS:     alicepass
      BOB_USER:       bob@test.local
      BOB_PASS:       bobpass
    networks: [mail]
    command: ["pytest", "-v", "--tb=short"]

networks:
  mail:
  greylisting:
  db-net:
  dkim-net:
  dns-net:
    ipam:
      config:
        - subnet: 10.100.0.0/24

volumes:
  fake-mails:
  dkim-keys:
