services:

  dns:
    build: ./dns
    networks:
      dns-net:
        ipv4_address: 10.100.0.2
    healthcheck:
      test: ["CMD-SHELL", "nc -w1 127.0.0.1 53 </dev/null"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  opendkim:
    build: ../../opendkim
    environment:
      DOMAIN: test.local
    volumes:
      - dkim-keys:/etc/opendkim/keys
    networks: [dkim-net]
    healthcheck:
      test: ["CMD-SHELL", "test -s /run/opendkim/opendkim.pid && kill -0 $(cat /run/opendkim/opendkim.pid)"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  postfix:
    build: ../../postfix
    hostname: postfix.test.local
    environment:
      GREYLIST:       postgrey
      OPENDKIM:       opendkim
      DOMAIN:         test.local
      HOSTNAME:       mail.test.local
      HOSTROOT:       test.local
      DB_HOST:        db
      DB_USER:        postfixadmin
      DB_PASSWORD:    testpass
      DB_NAME:        postfixadmin
      DISABLE_DNSBL:  "yes"
      MYNETWORKS:     "127.0.0.0/8"
    dns: ["10.100.0.2"]
    depends_on:
      db:
        condition: service_healthy
      opendkim:
        condition: service_healthy
      dns:
        condition: service_healthy
    networks: [mail, greylisting, db-net, dkim-net, dns-net]

  dovecot:
    build: ../../dovecot
    environment:
      DB_HOST:              db
      DB_USER:              postfixadmin
      DB_PASSWORD:          testpass
      DB_NAME:              postfixadmin
      DOMAIN:               test.local
      DEFAULT_PASS_SCHEME:  PLAIN
    depends_on:
      db:
        condition: service_healthy
    networks: [mail, db-net]

  postgrey:
    build: ../../postgrey
    command: ["-w", "5"]
    volumes:
      - ./greylist.conf:/etc/milter-greylist/greylist.conf:ro
    networks: [greylisting]
    dns_opt:
      - "timeout:1"
      - "attempts:1"
    healthcheck:
      test: ["CMD-SHELL", "nc -w2 127.0.0.1 10025 </dev/null"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE:             postfixadmin
      MYSQL_USER:                 postfixadmin
      MYSQL_PASSWORD:             testpass
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - ./init/db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "postfixadmin", "-ptestpass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [db-net]

  fake-smtp:
    build: ../../../fake-smtp
    volumes:
      - fake-mails:/mails
    networks: [mail]

  postfixadmin-db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE:             postfixadmin
      MYSQL_USER:                 postfixadmin
      MYSQL_PASSWORD:             testpass
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "postfixadmin", "-ptestpass"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [ui-net]

  postfixadmin:
    build: ../../postfixadmin
    environment:
      DATABASE_TYPE:          mysqli
      DATABASE_HOST:          postfixadmin-db
      DATABASE_NAME:          postfixadmin
      DATABASE_USER:          postfixadmin
      DATABASE_PASSWORD:      testpass
      SETUP_PASSWORD:              "$$2y$$12$$MHkqblkyo7WD0q6D3I7y9epJiZO9MqyN4AIYxmtn1NuyikRIvpDUy"
      EMAILCHECK_RESOLVE_DOMAIN:   "NO"
      ALIASES:                "10"
      MAILBOXES:              "10"
      MAXQUOTA:               "10"
      DOMAIN_QUOTA_DEFAULT:   "2048"
    depends_on:
      postfixadmin-db:
        condition: service_healthy
    networks: [ui-net]

  postfixadmin-proxy:
    build: ../../postfixadmin-proxy
    depends_on: [postfixadmin]
    networks: [ui-net]

  snappymail-init:
    image: mwaeckerlin/very-base
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /data/_data_/_default_/configs && printf '[security]\\nadmin_password = \"$$2y$$12$$wbso8NPeetgyrrwa5yKLBup0N011YwzKfyOYb0TCtsv/jX2q58nJi\"\\nadmin_login = \"admin\"\\n' > /data/_data_/_default_/configs/application.ini && chown -R 100 /data"
    volumes:
      - snappymail-data:/data
    networks: []

  snappymail:
    build:
      context: ../../rainloop
      dockerfile: Dockerfile.php-fpm
      target: php-fpm
    depends_on:
      snappymail-init:
        condition: service_completed_successfully
    volumes:
      - snappymail-data:/app/data
    networks: [ui-net, mail]

  snappymail-proxy:
    build:
      context: ../../rainloop
      dockerfile: Dockerfile.nginx
    depends_on: [snappymail]
    networks: [ui-net]

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    depends_on:
      postfix:
        condition: service_started
      dovecot:
        condition: service_started
      postgrey:
        condition: service_healthy
      postfixadmin-proxy:
        condition: service_started
      snappymail-proxy:
        condition: service_started
    environment:
      POSTFIX_HOST:       postfix
      DOVECOT_HOST:       dovecot
      OPENDKIM_HOST:      opendkim
      SMTP_PORT:          "25"
      IMAP_PORT:          "143"
      POP3_PORT:          "110"
      SIEVE_PORT:         "4190"
      OPENDKIM_PORT:      "10026"
      MAIL_DOMAIN:        test.local
      ALICE_USER:         alice@test.local
      ALICE_PASS:         alicepass
      BOB_USER:           bob@test.local
      BOB_PASS:           bobpass
      POSTFIXADMIN_URL:   "http://postfixadmin-proxy:8080"
      SNAPPYMAIL_URL:     "http://snappymail-proxy:8080"
      ADMIN_USER:         admin@test.local
      ADMIN_PASS:         Admin123pass
      SETUP_PASS:         test123
      SM_ADMIN_USER:      "admin"
      SM_ADMIN_PASS:      "12345"
    networks: [mail, ui-net]
    command: ["pytest", "-v", "--tb=short"]

networks:
  mail:
  greylisting:
  db-net:
  dkim-net:
  dns-net:
    ipam:
      config:
        - subnet: 10.100.0.0/24
  ui-net:

volumes:
  fake-mails:
  dkim-keys:
  snappymail-data:
