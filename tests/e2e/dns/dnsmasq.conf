no-resolv
no-hosts
# Authoritative for test.local: unknown records get NXDOMAIN not REFUSED
local=/test.local/
# A record + wildcard for all subdomains (satisfies reject_unknown_recipient_domain)
address=/.test.local/10.1.1.1
# MX
mx-host=test.local,mail.test.local,10
# SPF: authorize private Docker subnets; ~all = softfail for others
txt-record=test.local,v=spf1 ip4:10.0.0.0/8 ip4:172.16.0.0/12 ip4:192.168.0.0/16 ~all
